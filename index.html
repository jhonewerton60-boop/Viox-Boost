<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turbo Booster</title>

<style>
body {
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}

button {
  background:#7b00ff;
  color:white;
  border:none;
  padding:15px;
  margin:10px;
  width:220px;
  border-radius:20px;
  font-size:16px;
  box-shadow:0 0 15px #7b00ff;
}

.card {
  margin-top:20px;
  padding:20px;
  border-radius:20px;
  background:#111;
  box-shadow:0 0 20px #7b00ff;
}
</style>
</head>

<body>

<h1>⚡ Turbo Game Booster ⚡</h1>

<div class="card">

<button onclick="turbo()">🚀 Modo Turbo</button>
<button onclick="ram()">🧹 Limpar RAM</button>
<button onclick="fps()">🎮 FPS Estável</button>
<button onclick="battery()">🔋 Economia</button>
<button onclick="touch()">📱 Touch Booster</button>
<button onclick="ultramode()">🔥 Ultra Gaming</button>
  
<p id="status"></p>

</div>

<script>

function turbo(){
navigator.clipboard.writeText(
"cmd power set-fixed-performance-mode-enabled true\nsettings put global window_animation_scale 0\nsettings put global transition_animation_scale 0\nsettings put global animator_duration_scale 0"
);
document.getElementById("status").innerText="Modo Turbo Copiado! Abra o LADB.";
}

function ram(){
navigator.clipboard.writeText(
"cmd activity kill-all"
);
document.getElementById("status").innerText="RAM limpa! Abra o LADB.";
}

function fps(){
navigator.clipboard.writeText(
"settings put system peak_refresh_rate 90.0\nsettings put system min_refresh_rate 90.0"
);
document.getElementById("status").innerText="FPS Estável Copiado!";
}

function battery(){
navigator.clipboard.writeText(
"cmd power set-fixed-performance-mode-enabled false"
);
document.getElementById("status").innerText="Modo Economia Copiado!";
}
